<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CyanoSafe CA — HAB Safety Map</title>
<style>
:root{
  --danger:#C62828; --warning:#E65100; --caution:#F9A825;
  --watch:#00796B; --mat:#5D4037; --other:#607D8B;
  --ca-blue:#003368; --ca-gold:#FDB913;
  --bg:#F0F4F8; --white:#fff; --text:#1a2332; --sub:#5a6779; --border:#d0d8e4;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);
     color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--ca-blue);color:#fff;padding:0 16px;height:52px;
       display:flex;align-items:center;justify-content:space-between;
       flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.35);z-index:100;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-title{font-size:.98rem;font-weight:700;line-height:1.2;}
.hdr-title small{display:block;font-size:.68rem;font-weight:400;opacity:.8;}
.hdr-right{display:flex;gap:6px;align-items:center;}
.lang-btn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;
          padding:4px 11px;border-radius:4px;cursor:pointer;font-size:.78rem;font-weight:500;}
.lang-btn.active{background:var(--ca-gold);border-color:var(--ca-gold);color:#000;}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:300px;background:#fff;border-right:1px solid var(--border);
         display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-scroll{overflow-y:auto;flex:1;padding:10px 12px;}
.sb-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;
          color:var(--sub);margin:12px 0 4px;font-weight:700;}
.sb-label:first-child{margin-top:0;}
.search-box{width:100%;padding:6px 9px;border:1px solid var(--border);
            border-radius:var(--radius);font-size:.83rem;outline:none;
            margin-bottom:7px;background:var(--bg);}
.search-box:focus{border-color:var(--ca-blue);}
select.filter{width:100%;padding:5px 7px;border:1px solid var(--border);
              border-radius:var(--radius);font-size:.81rem;outline:none;
              margin-bottom:7px;background:var(--bg);cursor:pointer;}
.stats-bar{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px;}
.stat-card{background:var(--bg);border-radius:6px;padding:7px 9px;text-align:center;border:1px solid var(--border);}
.stat-num{font-size:1.25rem;font-weight:800;color:var(--ca-blue);line-height:1;}
.stat-lbl{font-size:.64rem;color:var(--sub);margin-top:2px;}
.legend{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.leg-row{display:flex;align-items:center;gap:7px;font-size:.75rem;cursor:pointer;
         padding:3px 5px;border-radius:4px;}
.leg-row:hover{background:var(--bg);}
.leg-row.dimmed{opacity:.35;}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1);}
.leg-count{margin-left:auto;color:var(--sub);font-size:.7rem;font-weight:600;}
.bloom-list{display:flex;flex-direction:column;gap:4px;}
.bloom-card{border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;
            cursor:pointer;border-left:4px solid var(--other);transition:box-shadow .12s;}
.bloom-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.bloom-card.adv-Danger{border-left-color:var(--danger);}
.bloom-card.adv-Warning{border-left-color:var(--warning);}
.bloom-card.adv-Caution{border-left-color:var(--caution);}
.bloom-card.adv-Watch{border-left-color:var(--watch);}
.bloom-card.adv-Mat{border-left-color:var(--mat);}
.bloom-name{font-size:.83rem;font-weight:700;}
.bloom-meta{font-size:.7rem;color:var(--sub);margin-top:1px;}
.bloom-badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:.66rem;
             font-weight:700;text-transform:uppercase;color:#fff;margin-top:3px;}
.no-results{text-align:center;padding:20px 10px;color:var(--sub);font-size:.82rem;}
/* MAP AREA */
#map-wrap{flex:1;position:relative;overflow:hidden;background:#e8edf2;}
#map-canvas{position:absolute;top:0;left:0;cursor:grab;}
#map-canvas.dragging{cursor:grabbing;}
/* TOOLTIP */
#tooltip{position:fixed;background:#fff;border:1px solid var(--border);
         border-radius:var(--radius);padding:10px 13px;pointer-events:none;
         display:none;z-index:1000;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.15);
         font-size:.78rem;line-height:1.5;}
#tooltip h3{font-size:.9rem;font-weight:800;color:var(--ca-blue);margin-bottom:5px;}
#tooltip .t-badge{display:inline-block;padding:2px 8px;border-radius:12px;
                  font-size:.68rem;font-weight:700;text-transform:uppercase;
                  color:#fff;margin-bottom:6px;}
#tooltip table{border-collapse:collapse;width:100%;}
#tooltip td{padding:2px 0;vertical-align:top;}
#tooltip td:first-child{color:var(--sub);padding-right:8px;font-weight:600;width:36%;white-space:nowrap;}
#tooltip .guidance{margin-top:7px;padding:7px 9px;border-radius:5px;font-size:.74rem;line-height:1.5;}
.g-Danger{background:#ffebee;border-left:3px solid var(--danger);}
.g-Warning{background:#fff3e0;border-left:3px solid var(--warning);}
.g-Caution{background:#fffde7;border-left:3px solid var(--caution);}
.g-Watch,.g-Mat,.g-Other{background:#e8f5e9;border-left:3px solid var(--watch);}
#tooltip .guidance strong{display:block;margin-bottom:2px;}
/* MAP CONTROLS */
.map-controls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:40;}
.map-btn{width:32px;height:32px;background:#fff;border:1px solid var(--border);
         border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;
         align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.map-btn:hover{background:var(--bg);}
.map-legend-wrap{position:absolute;bottom:10px;left:10px;background:rgba(255,255,255,.92);
                 border:1px solid var(--border);border-radius:6px;padding:8px 10px;
                 font-size:.72rem;z-index:40;}
.map-leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.map-leg-row:last-child{margin-bottom:0;}
.map-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.day-btn{flex:1;padding:5px 0;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:.75rem;font-weight:600;color:var(--sub);}
.day-btn:hover{background:#e2e8f0;}
.day-btn.active{background:var(--ca-blue);border-color:var(--ca-blue);color:#fff;}
@media print{body>*:not(#sign-overlay){display:none!important;}#sign-overlay{position:static!important;}#sign-backdrop{position:static!important;background:none!important;padding:0!important;display:block!important;}.no-print{display:none!important;}}
#tooltip .qr-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}
#tooltip .qr-wrap canvas{border-radius:4px;}
#tooltip .qr-label{font-size:.64rem;color:var(--sub);line-height:1.4;}
#tooltip .qr-label strong{display:block;color:var(--text);font-size:.7rem;}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<header>
  <div class="hdr-brand">
    <span style="font-size:1.4rem">🌊</span>
    <div class="hdr-title">CyanoSafe CA <small>Harmful Algal Bloom Safety Map</small></div>
  </div>
  <div class="hdr-right">
    <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('es',this)">ES</button>
  </div>
</header>
<div class="app-body">
  <div class="sidebar">
    <div class="sb-scroll">
      <div class="sb-label" id="lbl-search">Search</div>
      <input class="search-box" id="search" type="search" placeholder="Water body or county…" oninput="applyFilters()"/>
      <div class="sb-label" id="lbl-adv">Advisory Level</div>
      <div class="legend" id="legend"></div>
      <div class="sb-label" id="lbl-status">Status</div>
      <select class="filter" id="fStatus" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="Open">Open</option>
        <option value="Ongoing">Ongoing</option>
        <option value="Re-opened">Re-opened</option>
        <option value="Closed">Closed</option>
      </select>
      <div class="sb-label" id="lbl-county">County</div>
      <select class="filter" id="fCounty" onchange="applyFilters()"></select>
      <div class="sb-label" id="lbl-rwb">Regional Water Board</div>
      <select class="filter" id="fRWB" onchange="applyFilters()"></select>
      <div class="sb-label">Date Range</div>
      <div style="display:flex;gap:4px;margin-bottom:5px;">
        <button class="day-btn" onclick="setDays(30,this)">30d</button>
        <button class="day-btn" onclick="setDays(60,this)">60d</button>
        <button class="day-btn" onclick="setDays(90,this)">90d</button>
        <button class="day-btn" onclick="setDays(0,this)">All</button>
      </div>
      <div style="display:flex;gap:5px;margin-bottom:7px;align-items:center;">
        <input type="date" id="fDateFrom" class="filter" style="flex:1;padding:5px 6px;margin-bottom:0;" onchange="clearDayBtns();applyFilters()"/>
        <span style="color:var(--sub);font-size:.75rem;flex-shrink:0;">–</span>
        <input type="date" id="fDateTo" class="filter" style="flex:1;padding:5px 6px;margin-bottom:0;" onchange="clearDayBtns();applyFilters()"/>
      </div>
      <div class="stats-bar" id="statsBar"></div>
      <div class="sb-label">Bloom Reports <span id="listCount" style="font-weight:400;color:var(--sub)"></span></div>
      <div class="bloom-list" id="bloomList"></div>
    </div>
  </div>
  <div id="map-wrap">
    <div id="map-canvas" style="position:absolute;inset:0;"></div>
    <div id="tooltip"></div>
  </div>
</div>
<script>
let RAW = [];

// ── CLASSIFY ──────────────────────────────────────────────────────────────────
function classifyAdv(adv){
  if(!adv) return 'Other';
  const a = adv.toLowerCase();
  if(a.includes('danger')) return 'Danger';
  if(a.includes('warning')) return 'Warning';
  if(a.includes('caution')) return 'Caution';
  if(a.includes('mat')||a.includes('benthic')) return 'Mat';
  if(a.includes('awareness')||a.includes('watch')) return 'Watch';
  return 'Other';
}
const ADV = {
  Danger:  {color:'#C62828',label:'Danger',       label_es:'Peligro',       order:0, r:9},
  Warning: {color:'#E65100',label:'Warning',      label_es:'Advertencia',   order:1, r:8},
  Caution: {color:'#F9A825',label:'Caution',      label_es:'Precaución',    order:2, r:7},
  Watch:   {color:'#00796B',label:'Watch/Awareness',label_es:'Vigilancia',  order:3, r:6},
  Mat:     {color:'#5D4037',label:'Algal Mat',    label_es:'Tapete Algal',  order:4, r:6},
  Other:   {color:'#607D8B',label:'Informational',label_es:'Informativo',   order:5, r:5},
};
const GUIDANCE = {
  en:{
    Danger: {hdr:'⛔ DANGER — Do Not Enter Water',body:'Keep children and pets out of the water. Toxins can be fatal to pets within minutes.'},
    Warning:{hdr:'⚠️ WARNING — Avoid Water Contact',body:'No swimming or wading. Keep pets away. Rinse immediately if exposed.'},
    Caution:{hdr:'🟡 CAUTION — Limited Contact',body:'Avoid swallowing water. No swimming for children or pets. Rinse after contact.'},
    Watch:  {hdr:'🟢 WATCH — Stay Alert',body:'A bloom has been observed. Avoid contact with visible scum or discolored water.'},
    Mat:    {hdr:'🟤 ALGAL MAT — Do Not Touch',body:'Benthic mat detected. Do not let children or pets touch bottom sediment.'},
    Other:  {hdr:'ℹ️ INFORMATIONAL',body:'Monitoring in progress. Check back for updates before water activities.'},
  },
  es:{
    Danger: {hdr:'⛔ PELIGRO — No Entre al Agua',body:'Mantenga niños y mascotas fuera del agua. Las toxinas pueden ser fatales en minutos.'},
    Warning:{hdr:'⚠️ ADVERTENCIA — Evite Contacto',body:'No nadar ni vadear. Mantenga mascotas alejadas. Enjuáguese si se expone.'},
    Caution:{hdr:'🟡 PRECAUCIÓN — Contacto Limitado',body:'Evite tragar agua. Sin natación para niños ni mascotas. Enjuáguese después.'},
    Watch:  {hdr:'🟢 VIGILANCIA — Esté Alerta',body:'Se observó una floración. Evite contacto con espuma o agua decolorada.'},
    Mat:    {hdr:'🟤 TAPETE ALGAL — No Toque',body:'Tapete bentónico detectado. No permita que niños o mascotas toquen el sedimento.'},
    Other:  {hdr:'ℹ️ INFORMATIVO',body:'Monitoreo en progreso. Consulte antes de actividades acuáticas.'},
  }
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = 'en';
let filtered = [];
let advFilter = new Set();

// Classify all records once
RAW.forEach(r => r._adv = classifyAdv(r.adv));

// ── MAP ENGINE (Leaflet) ───────────────────────────────────────────────────────
const map = L.map('map-canvas', {zoomControl: false}).setView([37.5, -119.5], 6);

L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'USGS National Map | CA Water Boards FHAB',
  opacity: 0.4,
  maxZoom: 16,
  minZoom: 5,
}).addTo(map);

L.control.zoom({position:'topright'}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);

function draw(){
  markerLayer.clearLayers();
  const sorted = [...filtered].sort((a,b) => ADV[a._adv].order - ADV[b._adv].order);
  sorted.forEach(r => {
    const m = ADV[r._adv];
    const circle = L.circleMarker([r.lat, r.lon], {
      radius: m.r,
      fillColor: m.color,
      fillOpacity: r.status === 'Closed' ? 0.3 : 0.8,
      color: '#fff',
      weight: 1.5,
      pane: 'markerPane'
    });
    circle.on('mouseover', e => {
      if(!pinnedTip) showTooltip(r, e.originalEvent.clientX, e.originalEvent.clientY);
    });
    circle.on('mouseout', () => {
      if(!pinnedTip) tip.style.display = 'none';
    });
    circle.on('click', e => {
      L.DomEvent.stopPropagation(e);
      e.originalEvent.stopPropagation();
      activeBloom = r;
      pinnedTip = true;
      showTooltip(r, e.originalEvent.clientX, e.originalEvent.clientY, true);
    });
    circle.addTo(markerLayer);
  });
}

map.on('click', () => {
  if(pinnedTip){ pinnedTip = false; tip.style.display = 'none'; }
});

function flyTo(lat, lon){
  map.setView([lat, lon], Math.max(map.getZoom(), 11));
}

function resize(){ map.invalidateSize(); }

// ── HOVER / TOOLTIP ────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');
let pinnedTip = false;

function showTooltip(r, cx, cy, pinned){
  const m = ADV[r._adv];
  const g = GUIDANCE[lang][r._adv];
  const obs = r.obs ? r.obs.split('T')[0] : '—';
  const rows = [
    [lang==='en'?'County':'Condado', r.county||'—'],
    [lang==='en'?'Region':'Región', (r.rwb||'—').replace('Region ','R')],
    [lang==='en'?'Observed':'Observado', obs],
    [lang==='en'?'Status':'Estado', r.status||'—'],
    r.size ? [lang==='en'?'Size':'Tamaño', r.size] : null,
    r.texture ? [lang==='en'?'Texture':'Textura', r.texture] : null,
    r.toxins ? ['Toxins', r.toxins] : null,
  ].filter(Boolean);

  const qrUrl = `${location.origin}${location.pathname}?id=${encodeURIComponent(r.id||'')}`;
  tip.innerHTML = `
    <h3>${r.name||'Unknown water body'}</h3>
    <span class="t-badge" style="background:${m.color}">${lang==='en'?m.label:m.label_es}</span>
    <table>${rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>
    <div class="guidance g-${r._adv}"><strong>${g.hdr}</strong>${g.body}</div>
    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=64x64&margin=2&data=${encodeURIComponent(qrUrl)}" width="64" height="64" alt="QR code" style="border-radius:4px;"/>
      <div class="qr-label"><strong>Scan for current info</strong>Scan to view live HAB alerts<br>for this water body</div>
    </div>
    <button onclick="printSign()" style="pointer-events:auto;margin-top:8px;width:100%;padding:6px;border:1px solid var(--ca-blue);border-radius:var(--radius);background:var(--ca-blue);color:#fff;cursor:pointer;font-size:.75rem;font-weight:700;">🖨️ Print Advisory Sign</button>
  `;
  tip.style.display = 'block';
  tip.style.pointerEvents = pinned ? 'auto' : 'none';
  const tw = 290, th = 220;
  const vw = window.innerWidth, vh = window.innerHeight;
  tip.style.left = (cx + tw + 12 > vw ? cx - tw - 8 : cx + 12) + 'px';
  tip.style.top  = (cy + th + 12 > vh ? cy - th    : cy + 12) + 'px';
}
document.addEventListener('click', e => {
  if(!tip.contains(e.target)) { pinnedTip = false; tip.style.display='none'; }
});

// ── SIGN CONTENT per advisory level (matching CA FHAB official templates) ─────
const SIGN = {
  Danger: {
    color:'#C62828', bg:'#ffebee',
    en: {
      level:'DANGER', headline:'HARMFUL ALGAL BLOOM',
      sub:'Stay out of the water until further notice.',
      items:[
        {icon:'🚫🏊',text:'No swimming, wading, or water sports'},
        {icon:'🚫🐕',text:'Keep pets and animals out of and away from the water'},
        {icon:'🚫🐟',text:'Do not eat fish, shellfish, or other animals from this water'},
        {icon:'🚫💧',text:'Do not drink, cook with, or wash dishes with this water'},
        {icon:'⚠️',   text:'Boiling or filtering does NOT remove toxins'},
        {icon:'🚿',   text:'Rinse with clean water if skin contact occurs'},
      ],
      footer:'If you or your pet feel ill after contact with this water, seek medical/veterinary attention immediately.'
    },
    es: {
      level:'PELIGRO', headline:'FLORACIÓN DAÑINA DE ALGAS',
      sub:'No entre al agua hasta nuevo aviso.',
      items:[
        {icon:'🚫🏊',text:'No nadar, vadear ni hacer deportes acuáticos'},
        {icon:'🚫🐕',text:'No permita que mascotas o animales entren o beban el agua'},
        {icon:'🚫🐟',text:'No coma peces, mariscos ni otros animales de esta agua'},
        {icon:'🚫💧',text:'No beba, cocine ni lave con esta agua'},
        {icon:'⚠️',   text:'Hervir o filtrar NO elimina las toxinas'},
        {icon:'🚿',   text:'Enjuáguese con agua limpia si hay contacto con la piel'},
      ],
      footer:'Si usted o su mascota se sienten mal después del contacto, busque atención médica/veterinaria de inmediato.'
    }
  },
  Warning: {
    color:'#E65100', bg:'#fff3e0',
    en: {
      level:'WARNING', headline:'HARMFUL ALGAL BLOOM',
      sub:'No swimming. Stay away from scum and discolored water.',
      items:[
        {icon:'🚫🏊',text:'No swimming or wading'},
        {icon:'🚫🐕',text:'Keep pets and animals out of and away from the water'},
        {icon:'⚠️🐟',text:'Avoid eating fish or shellfish from this water body'},
        {icon:'🚫💧',text:'Do not drink, cook with, or wash dishes with this water'},
        {icon:'⚠️',   text:'Boiling or filtering does NOT remove toxins'},
        {icon:'🚿',   text:'Rinse with clean water if skin contact occurs'},
      ],
      footer:'People and animals exposed to bloom water may experience illness. Seek medical/veterinary attention if symptoms develop.'
    },
    es: {
      level:'ADVERTENCIA', headline:'FLORACIÓN DAÑINA DE ALGAS',
      sub:'No nadar. Aléjese de espumas y agua decolorada.',
      items:[
        {icon:'🚫🏊',text:'No nadar ni vadear'},
        {icon:'🚫🐕',text:'No permita que mascotas o animales entren o beban el agua'},
        {icon:'⚠️🐟',text:'Evite comer peces o mariscos de este cuerpo de agua'},
        {icon:'🚫💧',text:'No beba, cocine ni lave con esta agua'},
        {icon:'⚠️',   text:'Hervir o filtrar NO elimina las toxinas'},
        {icon:'🚿',   text:'Enjuáguese con agua limpia si hay contacto con la piel'},
      ],
      footer:'Las personas y animales expuestos pueden enfermarse. Busque atención médica/veterinaria si aparecen síntomas.'
    }
  },
  Caution: {
    color:'#F9A825', bg:'#fffde7',
    en: {
      level:'CAUTION', headline:'HARMFUL ALGAL BLOOM',
      sub:'You can swim in this water, but stay away from algae and scum.',
      items:[
        {icon:'⚠️🏊',text:'Avoid swimming in or near visible algae or scum'},
        {icon:'🚫🐕',text:'Do not let pets or animals drink or go into scum areas'},
        {icon:'⚠️🐟',text:'Avoid eating shellfish from this water body'},
        {icon:'🚫💧',text:'Do not drink this water'},
        {icon:'⚠️',   text:'Boiling or filtering does NOT remove toxins'},
        {icon:'🚿',   text:'Rinse with clean water after any water contact'},
      ],
      footer:'A harmful algal bloom has been observed. Conditions may change — check back for updates before water activities.'
    },
    es: {
      level:'PRECAUCIÓN', headline:'FLORACIÓN DAÑINA DE ALGAS',
      sub:'Puede nadar, pero aléjese de algas y espumas.',
      items:[
        {icon:'⚠️🏊',text:'Evite nadar cerca de algas o espumas visibles'},
        {icon:'🚫🐕',text:'No permita que mascotas beban o entren en zonas con espuma'},
        {icon:'⚠️🐟',text:'Evite comer mariscos de este cuerpo de agua'},
        {icon:'🚫💧',text:'No beba esta agua'},
        {icon:'⚠️',   text:'Hervir o filtrar NO elimina las toxinas'},
        {icon:'🚿',   text:'Enjuáguese con agua limpia después de cualquier contacto'},
      ],
      footer:'Se ha observado una floración dañina. Las condiciones pueden cambiar — consulte antes de actividades acuáticas.'
    }
  },
  Watch: {
    color:'#00796B', bg:'#e0f2f1',
    en: {
      level:'WATCH / AWARENESS', headline:'HARMFUL ALGAL BLOOM OBSERVED',

let signOverlay = null;
let activeBloom = null;

function printSign(r){
  r = r || activeBloom;
  if(!r) return;
  const s = SIGN[r._adv] || SIGN.Other;
  const qrUrl = `${location.origin}${location.pathname}?id=${encodeURIComponent(r.id||'')}`;
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=4&data=${encodeURIComponent(qrUrl)}`;
  const obs = r.obs ? r.obs.split('T')[0] : '';
  const loc = [r.name, r.county ? r.county+' County' : '', r.rwb].filter(Boolean);

  function signHTML(lang){
    const t = s[lang];
    return `
    <div class="ca-sign" style="border:5px solid ${s.color};border-radius:10px;overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif;max-width:680px;margin:0 auto;background:#fff;">
      <div style="background:${s.color};color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <div>
          <div style="font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.85;">California State Water Resources Control Board</div>
          <div style="font-size:1.7rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;line-height:1.1;">${t.level}</div>
          <div style="font-size:1rem;font-weight:700;margin-top:2px;">${t.headline}</div>
        </div>
        <div style="font-size:2.8rem;opacity:.9;">🌊</div>
      </div>
      <div style="background:${s.bg};padding:10px 20px;border-bottom:2px solid ${s.color};">
        <div style="font-size:1rem;font-weight:800;color:${s.color};">${loc[0]||'Water Body'}</div>
        <div style="font-size:.78rem;color:#555;">${loc.slice(1).join(' · ')}</div>
      </div>
      <div style="padding:14px 20px 0;display:flex;gap:16px;">
        <div style="flex:1;">
          <div style="font-size:.95rem;font-weight:700;margin-bottom:10px;color:#111;">${t.sub}</div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            ${t.items.map(i=>`<div style="display:flex;align-items:flex-start;gap:8px;font-size:.82rem;line-height:1.4;"><span style="font-size:1rem;flex-shrink:0;">${i.icon}</span><span>${i.text}</span></div>`).join('')}
          </div>
          <div style="margin-top:10px;padding:8px 10px;background:${s.bg};border-left:3px solid ${s.color};font-size:.72rem;color:#444;line-height:1.45;">${t.footer}</div>
          ${obs?`<div style="font-size:.68rem;color:#777;margin-top:6px;">📅 Observed: ${obs}${r.status?' · Status: '+r.status:''}</div>`:''}
        </div>
        <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <img src="${qrSrc}" width="120" height="120" alt="QR" style="border:2px solid #ddd;border-radius:6px;"/>
          <div style="font-size:.6rem;color:#666;text-align:center;line-height:1.4;">Scan for live<br>HAB alerts</div>
        </div>
      </div>
      <div style="margin:10px 20px 0;border-top:1px solid #ddd;padding:8px 0;display:flex;justify-content:space-between;align-items:center;font-size:.62rem;color:#777;">
        <span>mywaterquality.ca.gov/habs</span>
        <span>CyanoSafe CA · FHAB Program</span>
        <span>Report: 1-844-729-6466</span>
      </div>
      <div style="padding:8px 20px 14px;display:flex;justify-content:center;">
        <div style="width:90%;height:3px;background:${s.color};border-radius:2px;opacity:.25;"></div>
      </div>
    </div>`;
  }

  // Remove any existing overlay
  if(signOverlay) signOverlay.remove();

  signOverlay = document.createElement('div');
  signOverlay.id = 'sign-overlay';
  signOverlay.innerHTML = `
    <div id="sign-backdrop" onclick="closeSign()" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;">
      <div onclick="event.stopPropagation()" style="width:100%;max-width:720px;">
        <div class="no-print" style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px;">
          <button onclick="window.print()" style="padding:8px 20px;background:#003368;color:#fff;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;font-weight:700;">🖨️ Print</button>
          <button onclick="closeSign()" style="padding:8px 16px;background:#fff;color:#333;border:1px solid #ccc;border-radius:6px;font-size:.85rem;cursor:pointer;">✕ Close</button>
        </div>
        <div id="sign-content">
          ${signHTML('en')}
          <div style="margin:16px 0;border-top:2px dashed #ccc;"></div>
          ${signHTML('es')}
        </div>
      </div>
    </div>`;
  document.body.appendChild(signOverlay);
}

function closeSign(){
  if(signOverlay){ signOverlay.remove(); signOverlay=null; }
}

// ── FILTERS & SIDEBAR ─────────────────────────────────────────────────────────
function clearDayBtns(){
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
}
function setDays(n, btn){
  clearDayBtns();
  btn.classList.add('active');
  if(n === 0){
    document.getElementById('fDateFrom').value = '';
    document.getElementById('fDateTo').value = '';
  } else {
    const to = new Date();
    const from = new Date();
    from.setDate(from.getDate() - n);
    document.getElementById('fDateFrom').value = from.toISOString().slice(0,10);
    document.getElementById('fDateTo').value = to.toISOString().slice(0,10);
  }
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const status = document.getElementById('fStatus').value;
  const county = document.getElementById('fCounty').value;
  const rwb = document.getElementById('fRWB').value;
  const dateFrom = document.getElementById('fDateFrom').value;
  const dateTo   = document.getElementById('fDateTo').value;
  filtered = RAW.filter(r => {
    if(advFilter.size && !advFilter.has(r._adv)) return false;
    if(status && r.status !== status) return false;
    if(county && r.county !== county) return false;
    if(rwb && r.rwb !== rwb) return false;
    if(q && !((r.name||'')+(r.county||'')).toLowerCase().includes(q)) return false;
    const obs = r.obs ? r.obs.slice(0,10) : null;
    if(dateFrom && (!obs || obs < dateFrom)) return false;
    if(dateTo   && (!obs || obs > dateTo))   return false;
    return true;
  });
  draw();
  renderList(filtered);
  renderStats(filtered);
}

function renderList(data){
  const list = document.getElementById('bloomList');
  const cnt = document.getElementById('listCount');
  cnt.textContent = '('+data.length.toLocaleString()+')';
  if(!data.length){
    list.innerHTML=`<div class="no-results">${lang==='en'?'No blooms match filters.':'Sin resultados.'}</div>`;
    return;
  }
  const show = data.slice(0,60);
  list.innerHTML = show.map(r => {
    const m = ADV[r._adv];
    const obs = r.obs ? r.obs.split('T')[0] : '';
    return `<div class="bloom-card adv-${r._adv}" onclick="flyTo(${r.lat},${r.lon})">
      <div class="bloom-name">${r.name||'Unknown'}</div>
      <div class="bloom-meta">${r.county||''}${obs?' · '+obs:''}</div>
      <span class="bloom-badge" style="background:${m.color}">${lang==='en'?m.label:m.label_es}</span>
      ${r.toxins?'<span class="bloom-badge" style="background:#455a64;margin-left:3px">🧪</span>':''}
    </div>`;
  }).join('');
  if(data.length>60) list.innerHTML+=`<div class="no-results">…and ${(data.length-60).toLocaleString()} more. Filter to narrow.</div>`;
}

function renderStats(data){
  const bar = document.getElementById('statsBar');
  const active = data.filter(r=>r.status&&['Open','Ongoing','Re-opened'].includes(r.status)).length;
  const danger = data.filter(r=>r._adv==='Danger').length;
  const counties = new Set(data.map(r=>r.county).filter(Boolean)).size;
  bar.innerHTML=`
    <div class="stat-card"><div class="stat-num">${data.length.toLocaleString()}</div><div class="stat-lbl">${lang==='en'?'Reports':'Reportes'}</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${danger}</div><div class="stat-lbl">${lang==='en'?'Danger':'Peligro'}</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--watch)">${active}</div><div class="stat-lbl">${lang==='en'?'Active':'Activos'}</div></div>
    <div class="stat-card"><div class="stat-num">${counties}</div><div class="stat-lbl">${lang==='en'?'Counties':'Condados'}</div></div>
  `;
}

function flyTo(lat, lon){
  view.cx = lon; view.cy = lat; view.scale = Math.max(view.scale, 6);
  draw();
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function buildLegend(){
  const counts = {};
  RAW.forEach(r => counts[r._adv]=(counts[r._adv]||0)+1);
  document.getElementById('legend').innerHTML = Object.entries(ADV)
    .sort((a,b)=>a[1].order-b[1].order)
    .map(([k,m])=>`<div class="leg-row" data-key="${k}" onclick="toggleAdv('${k}',this)">
      <span class="leg-dot" style="background:${m.color}"></span>
      <span class="leg-lbl">${m.label}</span>
      <span class="leg-count">${(counts[k]||0).toLocaleString()}</span>
    </div>`).join('');
}

function toggleAdv(key, el){
  if(advFilter.has(key)) advFilter.delete(key); else advFilter.add(key);
  document.querySelectorAll('.leg-row').forEach(r=>{
    r.classList.toggle('dimmed', advFilter.size>0 && !advFilter.has(r.dataset.key));
  });
  applyFilters();
}

// ── POPULATE DROPDOWNS ─────────────────────────────────────────────────────────
function populateSelects(){
  const counties=[...new Set(RAW.map(r=>r.county).filter(Boolean))].sort();
  const rwbs=[...new Set(RAW.map(r=>r.rwb).filter(Boolean))].sort();
  document.getElementById('fCounty').innerHTML='<option value="">All counties</option>'+counties.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('fRWB').innerHTML='<option value="">All regions</option>'+rwbs.map(r=>`<option>${r}</option>`).join('');
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
const LABELS = {
  en:{'lbl-search':'Search','lbl-adv':'Advisory Level','lbl-status':'Status','lbl-county':'County','lbl-rwb':'Regional Water Board'},
  es:{'lbl-search':'Buscar','lbl-adv':'Nivel de Aviso','lbl-status':'Estado','lbl-county':'Condado','lbl-rwb':'Junta Regional'},
};
function setLang(l, btn){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  Object.entries(LABELS[l]).forEach(([id,txt])=>{
    const el=document.getElementById(id); if(el) el.textContent=txt;
  });
  document.getElementById('search').placeholder=l==='en'?'Water body or county…':'Cuerpo de agua o condado…';
  // Update legend labels
  document.querySelectorAll('.leg-lbl').forEach(el=>{
    const key=el.closest('.leg-row')?.dataset.key;
    if(key) el.textContent=ADV[key][l==='en'?'label':'label_es'];
  });
  renderList(filtered);
  renderStats(filtered);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildLegend();
populateSelects();
fetch("blooms.json")
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(data=>{
    RAW=data;
    RAW.forEach(r=>r._adv=classifyAdv(r.adv));
    filtered=[...RAW];
    buildLegend();
    populateSelects();
    applyFilters();
    // Handle ?id= deep-link from QR code
    const urlId = new URLSearchParams(location.search).get('id');
    if(urlId){
      const target = RAW.find(r => String(r.id) === String(urlId));
      if(target){
        activeBloom = target;
        pinnedTip = true;
        const vw = window.innerWidth, vh = window.innerHeight;
        showTooltip(target, vw * 0.6, vh * 0.4, true);
        flyTo(target.lat, target.lon);
      }
    }
  })
  .catch(err=>{
    document.getElementById('bloomList').innerHTML=`<div class="no-results" style="color:red">Failed to load data: ${err.message}</div>`;
    console.error('blooms.json load error:', err);
  });
new ResizeObserver(resize).observe(document.getElementById('map-wrap'));
</script>
